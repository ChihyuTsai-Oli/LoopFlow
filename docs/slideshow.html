<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoopFlow Diagrams</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #858585;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  #slide-container {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #slide-img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    display: block;
    pointer-events: none;
  }

  #left-zone, #right-zone {
    position: absolute;
    top: 0;
    height: 100%;
    width: 50%;
    cursor: pointer;
    z-index: 10;
  }

  #left-zone  { left: 0; cursor: w-resize; }
  #right-zone { right: 0; cursor: e-resize; }

  #counter {
    position: fixed;
    bottom: 16px;
    right: 20px;
    color: rgba(255, 255, 255, 0.6);
    font-family: monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    z-index: 20;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="slide-container">
  <img id="slide-img" src="" alt="diagram">
  <div id="left-zone"  onclick="prev()"></div>
  <div id="right-zone" onclick="next()"></div>
</div>

<div id="counter"></div>

<script>
  const slides = [
    'images/diagrams/diagram_curve_1.svg',
    'images/diagrams/diagram_curve_2.svg',
    'images/diagrams/diagram_curve_3.svg',
    'images/diagrams/diagram_curve_4.svg',
    'images/diagrams/diagram_curve_5.svg',
    'images/diagrams/diagram_curve_6.svg',
    'images/diagrams/diagram_curve_7.svg',
    'images/diagrams/diagram_curve_8.svg',
    'images/diagrams/diagram_curve_9.svg',
    'images/diagrams/diagram_curve_10.svg',
    'images/diagrams/diagram_curve_11.svg',
    'images/diagrams/diagram_curve_12.svg',
    'images/diagrams/diagram_curve_13.svg',
    'images/diagrams/diagram_curve_14.svg',
    'images/diagrams/diagram_curve_15.svg',
    'images/diagrams/diagram_curve_16.svg',
  ];

  let current = 0;

  function show(index) {
    current = (index + slides.length) % slides.length;
    document.getElementById('slide-img').src = slides[current];
    document.getElementById('counter').textContent = (current + 1) + ' / ' + slides.length;
  }

  function next() { show(current + 1); }
  function prev() { show(current - 1); }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === ' ') next();
    if (e.key === 'ArrowLeft') prev();
  });

  show(0);
</script>

</body>
</html>
